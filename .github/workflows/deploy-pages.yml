name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Run determinism tests
        run: npm test

      - name: Build
        env:
          # Repo is served from https://<user>.github.io/<repo>/ — set the base
          # path to your repository name (with leading + trailing slash).
          VITE_BASE: /frame-feud/
          # Point the client at your deployed Cloudflare Worker (wss). Leave
          # empty to ship with online play disabled (local play still works).
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
